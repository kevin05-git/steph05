<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Letter</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: 'Georgia', serif;
        overflow: hidden;
    }

    /* CONTAINER */
    .container {
        position: relative;
        width: 450px;
        height: 320px;
        perspective: 1000px; /* Adds depth for the flap flip */
    }

    /* ENVELOPE */
    .envelope {
        width: 100%;
        height: 100%;
        background: #fff;
        position: absolute;
        top: 0;
        left: 0;
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        z-index: 5;
        border-radius: 8px;
        transition: transform 0.8s ease, opacity 0.8s ease;
    }

    .flap {
        position: absolute;
        width: 100%;
        height: 100%;
        background: #f8c8dc;
        clip-path: polygon(0 0, 100% 0, 50% 60%);
        transform-origin: top;
        transition: transform 0.6s ease;
        z-index: 6;
    }

    .seal {
        width: 55px;
        height: 55px;
        background: crimson;
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 7;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 24px;
        transition: opacity 0.3s;
    }

    /* THE LETTER */
    .letter {
        position: absolute;
        /* Positioned exactly in the middle of the container */
        top: 50%;
        left: 50%;
        width: 90%;
        height: auto;
        max-height: 80vh;
        background: #fffdf5;
        padding: 30px;
        box-sizing: border-box;
        border-radius: 10px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        z-index: 2; /* Starts behind the envelope */
        
        /* INITIAL STATE: Tiny, transparent, and slightly lower */
        opacity: 0;
        transform: translate(-50%, -20%) scale(0.1);
        transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.8s ease;
        pointer-events: none;
        overflow-y: auto;
    }

    /* OPEN STATE ANIMATIONS */
    .container.open .flap {
        transform: rotateX(180deg);
        z-index: 1; /* Move flap behind letter */
    }

    .container.open .envelope {
        transform: translateY(120px); /* Moves envelope down */
        opacity: 0.4;
    }

    .container.open .seal {
        opacity: 0;
    }

    .container.open .letter {
        opacity: 1;
        /* Moves to dead center and scales up */
        transform: translate(-50%, -50%) scale(1.1);
        z-index: 10;
        pointer-events: all;
        transition-delay: 0.6s; /* Wait for flap to open */
    }

    .letter p {
        margin: 14px 0;
        font-size: 16px;
        line-height: 1.5;
    }

    .signature {
        margin-top: 30px;
        text-align: right;
        font-style: italic;
    }

    /* HEARTS */
    .heart {
        position: fixed;
        width: 15px;
        height: 15px;
        background: red;
        transform: rotate(45deg);
        animation: float 5s linear infinite;
        z-index: 100;
        bottom: -20px;
    }

    .heart::before, .heart::after {
        content: '';
        width: 15px;
        height: 15px;
        background: red;
        border-radius: 50%;
        position: absolute;
    }
    .heart::before { top: -8px; left: 0; }
    .heart::after { left: -8px; top: 0; }

    @keyframes float {
        0% { transform: translateY(0) rotate(45deg); opacity: 1; }
        100% { transform: translateY(-110vh) rotate(45deg); opacity: 0; }
    }
</style>
</head>
<body>

<div class="container" id="container">
    <div class="letter">
        <p><strong>Happy Birthday Love!</strong></p>
        <p>I thank God for today, because even though the world doesn't deserve it, you came and made it better.</p>
        <p>I finally found that someone I can truly be happy with. You make me a better person, and I can't wait to spend the rest of my days with you.</p>
        <p class="signature">Yours truly,<br>Kevin2026</p>
    </div>

    <div class="envelope" onclick="toggleLetter()">
        <div class="flap"></div>
        <div class="seal">❤</div>
    </div>
</div>

<audio id="bgMusic" src="birthday.mp3" preload="auto" playsinline></audio>

<script>
let heartInterval;

function toggleLetter() {
    const container = document.getElementById('container');
    const music = document.getElementById('bgMusic');
    const isOpen = container.classList.contains('open');

    if (!isOpen) {
        container.classList.add('open');

        // Play Music
        music.volume = 0.4;
        music.play().catch(e => console.log("Audio waiting for user interaction"));

        // TRIGGER HEARTS: Starts only when opened
        heartInterval = setInterval(createHeart, 300);

    } else {
        container.classList.remove('open');
        music.pause();
        
        // STOP HEARTS: Clears the interval when closed
        clearInterval(heartInterval);
    }
}

function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = (3 + Math.random() * 3) + 's';
    
    // Add some color variety
    const colors = ['#ff4d4d', '#ff0000', '#ff85a2', '#ff0a54'];
    const randomColor = colors[Math.floor(Math.random() * colors.length)];
    heart.style.background = randomColor;
    heart.style.setProperty('--heart-color', randomColor); 
    // Applying color to pseudo-elements via CSS would need a different approach, 
    // but this keeps it simple.

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}
</script>

</body>
</html>
